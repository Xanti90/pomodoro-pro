<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Focumo</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="auth-body">

  <div class="auth-card">
    <div class="auth-logo">
      <img src="/static/favicon.svg" alt="Focumo" style="width:52px;height:52px">
    </div>
    <h1 class="auth-title">Focumo</h1>
    <p class="auth-sub">Inicia sesión para continuar</p>

    {% if error %}
      <div class="auth-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login" class="auth-form">
      <div class="field-group">
        <label class="field-label">Correo electrónico</label>
        <input type="email" name="email" class="field-input" placeholder="tu@email.com" required autofocus>
      </div>
      <div class="field-group">
        <label class="field-label">Contraseña</label>
        <input type="password" name="password" class="field-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-auth btn-primary-auth">Entrar</button>
    </form>

    {% if google_enabled %}
    <div class="auth-divider"><span>o</span></div>
    <a href="/auth/google" class="btn-auth btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18L12.048 13.56c-.806.54-1.836.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Entrar con Google
    </a>
    {% endif %}

    <p class="auth-link">¿No tienes cuenta? <a href="/register">Crear cuenta</a></p>
  </div>

  <!-- Footer legal -->
  <footer style="text-align:center;padding:24px 0 16px;font-size:.72rem;color:#BFA080">
    © 2026 Santiago Jiménez Téllez & Foco Studio. Todos los derechos reservados.<br>
    <a href="/privacy" style="color:#B8733A;text-decoration:none">Privacidad</a>
    &nbsp;·&nbsp;
    <a href="/terms" style="color:#B8733A;text-decoration:none">Términos</a>
    &nbsp;·&nbsp;
    <a href="mailto:hello@focumo.app" style="color:#B8733A;text-decoration:none">hello@focumo.app</a>
  </footer>

</body>
</html>
