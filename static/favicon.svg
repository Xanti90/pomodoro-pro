<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4924F"/>
      <stop offset="100%" stop-color="#B8733A"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F2C050"/>
      <stop offset="100%" stop-color="#FBF3E3" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <!-- Fondo circular -->
  <circle cx="50" cy="50" r="48" fill="url(#bg)"/>
  <!-- Anillo exterior decorativo -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
  <!-- Arco de progreso (el "foco") -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#ring)" stroke-width="4"
          stroke-linecap="round" stroke-dasharray="200 240" stroke-dashoffset="60"
          transform="rotate(-90 50 50)"/>
  <!-- Letra F -->
  <text x="50" y="64" font-family="-apple-system,BlinkMacSystemFont,SF Pro Display,sans-serif"
        font-weight="900" font-size="44" fill="white" text-anchor="middle"
        letter-spacing="-2">F</text>
  <!-- Punto de acento (amarillo) -->
  <circle cx="68" cy="32" r="7" fill="#F2C050"/>
  <circle cx="68" cy="32" r="4" fill="white" opacity="0.9"/>
</svg>
